<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru - SD Jatiwaringin 1</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CSS Utama -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HALAMAN LOGIN -->
    <div id="login-screen"
        style="display: flex; height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-bg-app) 100%); position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
        <div class="glass-panel" style="padding: 40px; width: 90%; max-width: 400px; text-align: center;">
            <div
                style="width: 70px; height: 70px; background: var(--color-primary); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; box-shadow: var(--shadow-md);">
                <i class="ph ph-graduation-cap"></i>
            </div>
            <h2 style="margin-bottom: 8px; font-weight: 800; font-size: 24px;">SD Jatiwaringin 1</h2>
            <p style="color: var(--color-text-muted); margin-bottom: 32px; font-size: 14px;">Portal Administrasi Terpadu
            </p>

            <form id="form-login" style="display: flex; flex-direction: column; gap: 16px;">
                <div style="position: relative;">
                    <i class="ph ph-envelope-simple"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); font-size: 20px;"></i>
                    <input type="email" id="login-email" class="form-control" placeholder="Email Guru" required
                        style="padding-left: 48px;">
                </div>
                <div style="position: relative;">
                    <i class="ph ph-lock-key"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); font-size: 20px;"></i>
                    <input type="password" id="login-pass" class="form-control" placeholder="Kata Sandi" required
                        style="padding-left: 48px;">
                </div>
                <button type="submit" class="btn btn-primary"
                    style="justify-content: center; padding: 14px; margin-top: 8px; font-size: 15px;">
                    <i class="ph ph-sign-in"></i> Masuk Sistem
                </button>
            </form>
            <p style="margin-top: 24px; font-size: 12px; color: var(--color-text-muted);">Sistem Keamanan Terenkripsi
                &bull; Versi 2.0</p>
        </div>
    </div>

    <!-- APLIKASI UTAMA -->
    <div id="main-app" class="app-container" style="display: none;">

        <!-- SIDEBAR NAVIGASI -->
        <aside class="sidebar">
            <div
                style="padding: 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--color-border);">
                <div style="background: var(--color-primary); color: white; padding: 8px; border-radius: 12px;"><i
                        class="ph ph-books" style="font-size: 24px;"></i></div>
                <div>
                    <h3 style="font-size: 15px; font-weight: 800;">Portal Guru</h3>
                    <p style="font-size: 11px; color: var(--color-text-muted);">SDN Jatiwaringin 1</p>
                </div>
            </div>

            <nav class="nav-menu"
                style="padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto;">
                <p
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 8px; padding-left: 12px;">
                    MENU UTAMA</p>
                <a href="#" class="nav-item btn btn-outline" data-target="dashboard"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i class="ph ph-squares-four"
                        style="font-size: 20px;"></i> Dasbor</a>
                <a href="#" class="nav-item btn btn-outline" data-target="kaldik"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i
                        class="ph ph-calendar-blank" style="font-size: 20px;"></i> Kalender Akademik</a>

                <p
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin: 16px 0 8px; padding-left: 12px;">
                    AKADEMIK</p>
                <a href="#" class="nav-item btn btn-outline" data-target="kelas"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i
                        class="ph ph-chalkboard-teacher" style="font-size: 20px;"></i> Kelas Saya</a>
                <a href="#" class="nav-item btn btn-outline" data-target="siswa"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i class="ph ph-users"
                        style="font-size: 20px;"></i> Data Siswa</a>
                <a href="#" class="nav-item btn btn-outline" data-target="presensi"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i
                        class="ph ph-hand-pointing" style="font-size: 20px;"></i> Absensi Harian</a>
                <a href="#" class="nav-item btn btn-outline" data-target="nilai"
                    style="justify-content: flex-start; border: none; padding: 12px 16px;"><i class="ph ph-exam"
                        style="font-size: 20px;"></i> Penilaian</a>
            </nav>

            <div class="sidebar-footer" style="padding: 24px 16px; border-top: 1px solid var(--color-border);">
                <a href="#" class="nav-item btn btn-outline" data-target="pengaturan"
                    style="justify-content: flex-start; border: none; width: 100%;"><i class="ph ph-gear"
                        style="font-size: 20px;"></i> Pengaturan</a>
                <a href="#" id="btn-keluar" class="btn btn-outline text-danger"
                    style="justify-content: flex-start; border: none; width: 100%; color: var(--color-danger);"><i
                        class="ph ph-sign-out" style="font-size: 20px;"></i> Keluar Sesi</a>
            </div>
        </aside>

        <!-- KONTEN UTAMA -->
        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div style="position: relative; width: 300px;">
                        <i class="ph ph-magnifying-glass"
                            style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted);"></i>
                        <input type="text" id="input-pencarian" class="form-control"
                            placeholder="Cari data siswa, nilai, kelas..."
                            style="padding-left: 44px; border-radius: 20px; background: var(--color-surface-hover); border: none;">
                    </div>
                    <div id="cloud-sync-status"
                        style="display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--color-text-muted);">
                        <i class="ph ph-cloud-check" style="font-size: 20px;"></i> <span
                            class="sync-text">Tersinkronisasi</span>
                    </div>
                </div>

                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="btn-icon-only" onclick="document.body.classList.toggle('dark-theme')"
                        style="background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--color-text-muted);"
                        title="Ganti Tema">
                        <i class="ph ph-moon-stars"></i>
                    </button>
                    <div style="width: 1px; height: 30px; background: var(--color-border);"></div>
                    <div class="user-profile" id="btn-profil"
                        style="display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 8px; border-radius: 12px; transition: background 0.2s;"
                        onmouseover="this.style.background='var(--color-surface-hover)'"
                        onmouseout="this.style.background='transparent'">
                        <div style="text-align: right;">
                            <h4 class="user-name" style="font-size: 14px; margin-bottom: 2px;">Memuat...</h4>
                            <p class="user-role" style="font-size: 11px; color: var(--color-text-muted);">Administrator
                            </p>
                        </div>
                        <div class="avatar"
                            style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; box-shadow: var(--shadow-sm);">
                            GP
                        </div>
                    </div>
                </div>
            </header>

            <div id="app-content" style="padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%;">
                <!-- Konten dinamis -->
            </div>
        </main>
    </div>

    <!-- Sistem Toast Notifikasi -->
    <div id="toast-container"
        style="position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px;">
    </div>

    <!-- Pustaka Grafik & Cetak Data -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- INJEKSI SHEET.JS -->

    <!-- Modul JavaScript Inti -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/database.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
