<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Guru - Sistem Informasi SD Jatiwaringin 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">
                    <i class="ph-fill ph-graduation-cap"></i>
                </div>
                <div class="logo-text">
                    <h2>SD Jatiwaringin 1</h2>
                    <p>Portal Akademik Guru</p>
                </div>
            </div>

            <div class="sidebar-content">
                <p class="menu-label">MENU UTAMA</p>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" data-target="dashboard">
                        <i class="ph ph-squares-four"></i> Dashboard
                    </a>
                    <a href="#" class="nav-item" data-target="kelas">
                        <i class="ph ph-chalkboard-teacher"></i> Kelas Saya
                    </a>
                    <a href="#" class="nav-item" data-target="siswa">
                        <i class="ph ph-users"></i> Data Siswa
                    </a>
                    <a href="#" class="nav-item" data-target="presensi">
                        <i class="ph ph-check-square-offset"></i> Presensi Harian
                    </a>
                    <a href="#" class="nav-item" data-target="nilai">
                        <i class="ph ph-exam"></i> Nilai Akademik
                    </a>
                </nav>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-outline w-100 mb-4" id="btn-tambah-data">
                    <i class="ph ph-plus"></i> Tambah Data
                </button>
                <a href="#" class="nav-item" id="btn-pengaturan"><i class="ph ph-gear"></i> Pengaturan</a>
                <a href="#" class="nav-item text-danger" id="btn-keluar">
                    <i class="ph ph-sign-out"></i> Keluar Sesi
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="input-pencarian" placeholder="Pencarian cepat di modul aktif...">
                </div>

                <div class="user-actions">
                    <button class="icon-button notification" id="btn-notifikasi">
                        <i class="ph ph-bell"></i>
                        <span class="indicator"></span>
                    </button>
                    <div class="divider"></div>
                    <div class="user-profile" id="btn-profil">
                        <div class="avatar">GP</div>
                        <div class="user-info">
                            <span class="user-name">Guru Pengajar</span>
                            <span class="user-role">Wali Kelas 4B</span>
                        </div>
                        <i class="ph ph-caret-down"></i>
                    </div>
                </div>
            </header>

            <div class="dashboard-wrapper" id="app-content">
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>

</html>
