<div class="view-section active">

    <div
        style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <div>
            <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px;">Dasbor Analitik
            </h1>
            <p style="color: var(--color-text-muted); font-size: 14px;" id="tanggal-hari-ini">Memuat tanggal...</p>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-outline" onclick="bukaModul('siswa')">
                <i class="ph ph-users"></i> Data Siswa
            </button>
            <button class="btn btn-primary" onclick="bukaModul('presensi')">
                <i class="ph ph-hand-pointing"></i> Mulai Absensi
            </button>
        </div>
    </div>

    <div
        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px;">
        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 16px;">
            <div
                style="width: 52px; height: 52px; border-radius: 16px; background: var(--color-primary-light); color: var(--color-primary); display: flex; align-items: center; justify-content: center; font-size: 28px;">
                <i class="ph-fill ph-student"></i></div>
            <div>
                <p
                    style="font-size: 12px; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px;">
                    TOTAL SISWA</p>
                <h3 style="font-size: 28px; font-weight: 800; line-height: 1;" id="dash-total-siswa">...</h3>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 16px;">
            <div
                style="width: 52px; height: 52px; border-radius: 16px; background: var(--color-info-bg); color: var(--color-info); display: flex; align-items: center; justify-content: center; font-size: 28px;">
                <i class="ph-fill ph-chalkboard-teacher"></i></div>
            <div>
                <p
                    style="font-size: 12px; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px;">
                    TOTAL KELAS</p>
                <h3 style="font-size: 28px; font-weight: 800; line-height: 1;" id="dash-total-kelas">...</h3>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 16px;">
            <div
                style="width: 52px; height: 52px; border-radius: 16px; background: var(--color-success-bg); color: var(--color-success); display: flex; align-items: center; justify-content: center; font-size: 28px;">
                <i class="ph-fill ph-check-circle"></i></div>
            <div>
                <p
                    style="font-size: 12px; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px;">
                    HADIR HARI INI</p>
                <h3 style="font-size: 28px; font-weight: 800; line-height: 1;" id="dash-hadir-hari-ini">100%</h3>
            </div>
        </div>

        <div class="glass-panel" style="padding: 20px; display: flex; align-items: center; gap: 16px;">
            <div
                style="width: 52px; height: 52px; border-radius: 16px; background: var(--color-warning-bg); color: var(--color-warning); display: flex; align-items: center; justify-content: center; font-size: 28px;">
                <i class="ph-fill ph-star"></i></div>
            <div>
                <p
                    style="font-size: 12px; color: var(--color-text-muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px;">
                    RATA-RATA NILAI</p>
                <h3 style="font-size: 28px; font-weight: 800; line-height: 1;" id="dash-rata-nilai">85.0</h3>
            </div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">

        <div class="glass-panel" style="padding: 24px; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 16px; display: flex; align-items: center; gap: 8px;">
                    <i class="ph-fill ph-chart-line-up" style="color: var(--color-primary); font-size: 20px;"></i> Tren
                    Akademik Bulanan
                </h3>
                <span class="badge badge-info">Semester Ganjil</span>
            </div>

            <div id="chart-container"
                style="flex: 1; background: var(--color-surface-solid); border-radius: var(--radius-md); border: 1px solid var(--color-border); padding: 16px; position: relative; min-height: 300px;">
                <canvas id="dashboard-chart"></canvas>
            </div>
        </div>

        <div class="glass-panel" style="padding: 24px; display: flex; flex-direction: column;">
            <h3 style="font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                <i class="ph-fill ph-calendar-check" style="color: var(--color-warning); font-size: 20px;"></i> Agenda
                Sekolah
            </h3>

            <div id="dashboard-kaldik-list" style="display: flex; flex-direction: column; gap: 12px; flex: 1;">
                <div class="skeleton" style="height: 70px; width: 100%; border-radius: 8px;"></div>
                <div class="skeleton" style="height: 70px; width: 100%; border-radius: 8px;"></div>
                <div class="skeleton" style="height: 70px; width: 100%; border-radius: 8px;"></div>
            </div>

            <button class="btn btn-outline" style="width: 100%; margin-top: 20px; justify-content: center;"
                onclick="bukaModul('kaldik')">
                Kelola Kalender <i class="ph ph-arrow-right"></i>
            </button>
        </div>
    </div>
</div>
