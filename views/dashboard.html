<div class="view-section">
    <div class="page-header">
        <div class="header-text">
            <h1>Selamat Pagi, Bapak/Ibu! 👋</h1>
            <p>Berikut adalah ringkasan aktivitas dan Kalender Pendidikan hari ini.</p>
        </div>
        <div class="date-card">
            <i class="ph ph-calendar-blank"></i>
            <div>
                <span class="date-label">HARI INI</span>
                <strong id="tanggal-hari-ini">Memuat...</strong>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="main-column">
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon primary-light"><i class="ph ph-book-open-text"></i></div>
                    <div class="stat-details">
                        <p>Jadwal Mengajar</p>
                        <h3 id="dash-total-kelas">0 Kelas</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success-light"><i class="ph ph-users-three"></i></div>
                    <div class="stat-details">
                        <p>Siswa Dikelola</p>
                        <h3 id="dash-total-siswa">0 Anak</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning-light"><i class="ph ph-clipboard-text"></i></div>
                    <div class="stat-details">
                        <p>Tugas Belum Dinilai</p>
                        <h3>0 Berkas</h3>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h2 style="margin: 0; display: flex; align-items: center; gap: 8px;">
                            <i class="ph ph-calendar-star" style="color: var(--color-primary); font-size: 24px;"></i>
                            Kalender Pendidikan
                        </h2>
                    </div>
                    <a href="#" onclick="bukaModul('kaldik')"
                        style="color: var(--color-primary); font-size: 13px; font-weight: 600; text-decoration: none; padding: 6px 12px; background: var(--color-primary-light); border-radius: 20px; transition: 0.2s;">Lihat
                        Lainnya &rarr;</a>
                </div>
                <div style="padding: 24px;">
                    <div id="dashboard-kaldik-list" style="display: flex; flex-direction: column; gap: 16px;">
                        <p class="text-muted"><i class="ph ph-spinner ph-spin"></i> Memuat agenda...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="side-column">
            <div class="card action-card">
                <h3 class="card-title">Aksi Cepat</h3>
                <p class="subtitle mb-4">Pintas ke tugas prioritas</p>
                <button class="btn-action" onclick="bukaModul('presensi')">
                    <div class="action-icon"><i class="ph ph-hand-pointing"></i></div>
                    <div class="action-text">
                        <h4>Input Presensi</h4>
                        <p>Catat kehadiran siswa</p>
                    </div>
                    <i class="ph ph-caret-right caret"></i>
                </button>
                <button class="btn-action" onclick="bukaModul('nilai')">
                    <div class="action-icon"><i class="ph ph-exam"></i></div>
                    <div class="action-text">
                        <h4>Input Nilai</h4>
                        <p>Tugas, UTS, UAS, PSAT</p>
                    </div>
                    <i class="ph ph-caret-right caret"></i>
                </button>
            </div>
        </div>
    </div>
</div>
