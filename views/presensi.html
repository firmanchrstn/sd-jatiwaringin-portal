<div class="view-section">
    <div class="page-header">
        <div class="header-text">
            <h1>Presensi & Kehadiran</h1>
            <p>Kelola data kehadiran siswa dengan dukungan Asisten AI Cerdas.</p>
        </div>
    </div>

    <div class="dashboard-grid" style="grid-template-columns: 1fr 380px; align-items: start;">
        <!-- KOLOM KIRI: Tabel Absen -->
        <div class="card data-table-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="ph ph-list-checks"></i> Riwayat Kehadiran</h2>
                <select id="filter-kelas-presensi" class="form-control" style="width: auto; padding: 4px 12px;">
                    <option value="Semua">Semua Kelas</option>
                    <option value="1A">Kelas 1A</option>
                    <option value="2A">Kelas 2A</option>
                    <option value="3A">Kelas 3A</option>
                    <option value="4A">Kelas 4A</option>
                    <option value="5A">Kelas 5A</option>
                    <option value="6A">Kelas 6A</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Jadwal / Mapel</th>
                            <th>Nama Siswa</th>
                            <th>Status</th>
                            <th style="text-align: right;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="body-tabel-presensi"></tbody>
                </table>
            </div>
            <div style="padding: 16px; border-top: 1px solid var(--color-border); text-align: right;">
                <button id="btn-ekspor-presensi" class="btn btn-outline"><i class="ph ph-download-simple"></i> Ekspor
                    (CSV)</button>
            </div>
        </div>

        <!-- KOLOM KANAN: Form Input & AI -->
        <div class="sticky-panel" style="display: flex; flex-direction: column; gap: 24px;">
            <div class="card">
                <div class="card-header">
                    <h2><i class="ph ph-plus-circle"></i> Catat Kehadiran</h2>
                </div>
                <div style="padding: 24px;">

                    <!-- KOTAK ASISTEN AI -->
                    <div
                        style="background: linear-gradient(135deg, #e0e7ff 0%, #ede9fe 100%); padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #c7d2fe; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                        <h3
                            style="color: #4f46e5; font-size: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                            <i class="ph-fill ph-magic-wand"></i> Asisten AI (Absen Cepat)</h3>
                        <textarea id="ai-absen-input" class="form-control"
                            placeholder="Cth: Hari ini Budi sakit, Siti izin ke luar kota, sisanya masuk."
                            style="resize: none; height: 70px; margin-bottom: 12px; border-color: #a5b4fc; background: white;"></textarea>
                        <button type="button" id="btn-proses-ai" class="btn"
                            style="width: 100%; justify-content: center; background: #4f46e5; color: white; border: none; font-weight: bold;"><i
                                class="ph ph-sparkle"></i> Proses dengan AI</button>
                    </div>

                    <div style="text-align: center; margin-bottom: 20px;">
                        <span
                            style="background: white; padding: 0 10px; color: var(--color-text-muted); font-size: 12px; position: relative; z-index: 1;">Atau
                            secara manual</span>
                        <hr style="margin-top: -8px; border: none; border-top: 1px dashed var(--color-border);">
                    </div>

                    <form id="form-tambah-presensi" style="display: flex; flex-direction: column; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">TANGGAL</label>
                            <input type="date" id="input-tanggal" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">JADWAL / KELAS</label>
                            <select id="input-mapel-kelas" class="form-control" required></select>
                        </div>

                        <!-- Mode Manual -->
                        <div class="form-group">
                            <label class="form-label">NAMA SISWA (MANUAL)</label>
                            <select id="input-nama" class="form-control" required disabled
                                style="background: var(--color-background); cursor: not-allowed;">
                                <option value="" disabled selected>Pilih Jadwal Dulu...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">STATUS</label>
                            <select id="input-status" class="form-control" required>
                                <option value="Hadir">Hadir</option>
                                <option value="Sakit">Sakit</option>
                                <option value="Izin">Izin</option>
                                <option value="Alpa">Alpa</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 8px; justify-content: center;">
                            Simpan Manual
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
