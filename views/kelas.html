<div class="view-section">
    <div class="page-header">
        <div class="header-text">
            <h1>Jadwal Mengajar</h1>
            <p>Manajemen jadwal otomatis terintegrasi (Format Hari & Jam).</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h2>Tambah Jadwal Kelas Baru</h2>
        </div>
        <div style="padding: 24px;">
            <form id="form-tambah-kelas" style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-row">
                    <div class="form-group" style="flex: 1.5;">
                        <label class="form-label">HARI</label>
                        <select id="input-hari" class="form-control" required>
                            <option value="" disabled selected>Pilih Hari...</option>
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">JAM KE</label>
                        <input type="number" id="input-jamke" class="form-control" placeholder="Mis: 1" min="1" max="10"
                            required>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label class="form-label">WAKTU (Rentang)</label>
                        <input type="text" id="input-waktu" class="form-control" placeholder="Mis: 07:00 - 08:30"
                            required autocomplete="off">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label class="form-label">MATA PELAJARAN</label>
                        <input type="text" id="input-mapel" class="form-control" placeholder="Mis: Tematik / Matematika"
                            required autocomplete="off">
                    </div>
                    <div class="form-group" style="flex: 1.5;">
                        <label class="form-label">KELAS</label>
                        <select id="input-namakelas" class="form-control" required>
                            <option value="" disabled selected>Pilih Bagian...</option>
                            <option value="1A">Kelas 1A</option>
                            <option value="1B">Kelas 1B</option>
                            <option value="1C">Kelas 1C</option>
                            <option value="2A">Kelas 2A</option>
                            <option value="2B">Kelas 2B</option>
                            <option value="2C">Kelas 2C</option>
                            <option value="3A">Kelas 3A</option>
                            <option value="3B">Kelas 3B</option>
                            <option value="3C">Kelas 3C</option>
                            <option value="4A">Kelas 4A</option>
                            <option value="4B">Kelas 4B</option>
                            <option value="4C">Kelas 4C</option>
                            <option value="5A">Kelas 5A</option>
                            <option value="5B">Kelas 5B</option>
                            <option value="5C">Kelas 5C</option>
                            <option value="6A">Kelas 6A</option>
                            <option value="6B">Kelas 6B</option>
                            <option value="6C">Kelas 6C</option>
                        </select>
                    </div>
                </div>

                <div
                    style="background: #F0FDF4; padding: 16px; border-radius: 8px; border: 1px solid #BBF7D0; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <i class="ph ph-whatsapp-logo" style="font-size: 24px; color: #16A34A;"></i>
                        <div>
                            <p style="font-weight: 600; font-size: 14px; color: #166534; margin-bottom: 2px;">Aktifkan
                                Pengingat WhatsApp</p>
                            <p style="font-size: 12px; color: #15803D;">Bot akan mengirim pesan ke nomor Anda H-30 Menit
                                sebelum jam mengajar dimulai.</p>
                        </div>
                    </div>
                    <input type="checkbox" id="input-wa" style="width: 20px; height: 20px; cursor: pointer;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: fit-content;"><i
                        class="ph ph-plus-circle"></i> Simpan Jadwal</button>
            </form>
        </div>
    </div>
    <div id="grid-kelas"
        style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding-bottom: 32px;">
    </div>
</div>
