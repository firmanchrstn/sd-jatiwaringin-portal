<div class="view-section active">
    <div
        style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <div>
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 4px;">Jadwal & Kelas</h1>
            <p style="color: var(--color-text-muted); font-size: 14px;">Manajemen rombongan belajar dan jadwal
                pelajaran.</p>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
        <div class="glass-panel" style="padding: 24px; height: fit-content;">
            <h3
                style="font-size: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--color-border); padding-bottom: 12px;">
                <i class="ph ph-plus-circle text-primary"></i> Tambah Jadwal Baru</h3>
            <form id="form-tambah-kelas" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="form-group"><label class="form-label"
                        style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">MATA
                        PELAJARAN</label><input type="text" id="input-mapel" class="form-control" required
                        placeholder="Cth: Bahasa Indonesia"></div>
                <div class="form-group"><label class="form-label"
                        style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">KELAS
                        TARGET</label><input type="text" id="input-namakelas" class="form-control" required
                        placeholder="Cth: 1A"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group"><label class="form-label"
                            style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">HARI</label>
                        <select id="input-hari" class="form-control" required>
                            <option>Senin</option>
                            <option>Selasa</option>
                            <option>Rabu</option>
                            <option>Kamis</option>
                            <option>Jumat</option>
                            <option>Sabtu</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label"
                            style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">JAM
                            KE</label><input type="text" id="input-jamke" class="form-control" required
                            placeholder="1-2"></div>
                </div>
                <div class="form-group"><label class="form-label"
                        style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">WAKTU</label><input
                        type="text" id="input-waktu" class="form-control" required placeholder="07:00 - 08:30"></div>

                <label
                    style="display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 12px; background: var(--color-surface-hover); border-radius: 8px; margin-top: 8px;">
                    <input type="checkbox" id="input-wa"
                        style="width: 18px; height: 18px; accent-color: var(--color-success);">
                    <span style="font-size: 13px; font-weight: 600;">Aktifkan Notifikasi WhatsApp (BETA)</span>
                </label>

                <button type="submit" class="btn btn-primary" style="justify-content: center; margin-top: 8px;"><i
                        class="ph ph-floppy-disk"></i> Simpan Jadwal</button>
            </form>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
            <h3 style="font-size: 16px; margin-bottom: 8px;"><i class="ph ph-list-bullets"></i> Daftar Kelas Saya</h3>
            <div id="grid-kelas"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px;">
            </div>
        </div>
    </div>
</div>
