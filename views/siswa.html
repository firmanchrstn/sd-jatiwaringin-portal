<div class="view-section">
    <div class="page-header">
        <div class="header-text">
            <h1>Data Siswa</h1>
            <p>Kelola data induk siswa SDN Jatiwaringin 1 dengan dukungan Asisten AI.</p>
        </div>
    </div>
    <div class="dashboard-grid" style="grid-template-columns: 1fr 380px; align-items: start;">

        <div class="card data-table-card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="ph ph-users"></i> Daftar Siswa</h2>
                <select id="filter-kelas-siswa" class="form-control" style="width: auto; padding: 4px 12px;">
                    <option value="Semua">Semua Kelas</option>
                    <option value="1A">Kelas 1A</option>
                    <option value="2A">Kelas 2A</option>
                    <option value="3A">Kelas 3A</option>
                    <option value="4A">Kelas 4A</option>
                    <option value="5A">Kelas 5A</option>
                    <option value="6A">Kelas 6A</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Identitas Siswa</th>
                            <th>Kelas</th>
                            <th>L/P</th>
                            <th>Nama Orang Tua</th>
                            <th style="text-align: right;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="body-tabel-siswa"></tbody>
                </table>
            </div>
            <div style="padding: 16px; border-top: 1px solid var(--color-border); text-align: right;">
                <button id="btn-ekspor-siswa" class="btn btn-outline"><i class="ph ph-download-simple"></i> Ekspor
                    (CSV)</button>
            </div>
        </div>

        <div class="sticky-panel" style="display: flex; flex-direction: column; gap: 24px;">
            <div class="card">
                <div class="card-header">
                    <h2><i class="ph ph-plus-circle"></i> Tambah Siswa</h2>
                </div>
                <div style="padding: 24px;">

                    <!-- KOTAK ASISTEN AI (PREMIUM DESIGN) -->
                    <div
                        style="position: relative; background: #0f172a; padding: 20px; border-radius: 12px; margin-bottom: 24px; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); overflow: hidden;">
                        <!-- Efek Cahaya AI (Glow) -->
                        <div
                            style="position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; background: #6366f1; filter: blur(40px); opacity: 0.5; pointer-events: none;">
                        </div>
                        <div
                            style="position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px; background: #a855f7; filter: blur(40px); opacity: 0.4; pointer-events: none;">
                        </div>

                        <h3
                            style="color: #e2e8f0; font-size: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; position: relative; z-index: 1;">
                            <i class="ph-fill ph-magic-wand" style="color: #a855f7; font-size: 18px;"></i>
                            <span
                                style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; font-weight: bold;">Asisten
                                AI (Input Cepat)</span>
                        </h3>

                        <textarea id="ai-siswa-input" class="form-control"
                            placeholder="Cth: Masukkan Andi (L) NIK 1234 anak pak Budi, dan Rini (P) NIK 5678 anak pak Joko ke kelas."
                            style="resize: none; height: 80px; margin-bottom: 16px; border: 1px solid #475569; background: rgba(30, 41, 59, 0.7); color: #f8fafc; border-radius: 8px; position: relative; z-index: 1; transition: all 0.3s;"
                            onfocus="this.style.borderColor='#818cf8'; this.style.boxShadow='0 0 0 3px rgba(99, 102, 241, 0.2)';"
                            onblur="this.style.borderColor='#475569'; this.style.boxShadow='none';"></textarea>

                        <button type="button" id="btn-proses-ai-siswa" class="btn"
                            style="width: 100%; justify-content: center; background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); color: white; border: none; font-weight: bold; border-radius: 8px; padding: 12px; position: relative; z-index: 1; transition: transform 0.2s, box-shadow 0.2s;"
                            onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(147, 51, 234, 0.4)';"
                            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
                            <i class="ph ph-sparkle"></i> Tambah via AI
                        </button>
                    </div>

                    <div style="text-align: center; margin-bottom: 20px;">
                        <span
                            style="background: white; padding: 0 10px; color: var(--color-text-muted); font-size: 12px; position: relative; z-index: 1;">Atau
                            secara manual</span>
                        <hr style="margin-top: -8px; border: none; border-top: 1px dashed var(--color-border);">
                    </div>

                    <form id="form-tambah-siswa" style="display: flex; flex-direction: column; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">NAMA LENGKAP</label>
                            <input type="text" id="s-nama" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">JENIS KELAMIN</label>
                            <select id="s-jk" class="form-control" required>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">KELAS</label>
                            <select id="s-kelas" class="form-control" required>
                                <option value="1A">Kelas 1A</option>
                                <option value="2A">Kelas 2A</option>
                                <option value="3A">Kelas 3A</option>
                                <option value="4A">Kelas 4A</option>
                                <option value="5A">Kelas 5A</option>
                                <option value="6A">Kelas 6A</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">NIK (Nomor Induk)</label>
                            <input type="number" id="s-nik" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">NAMA AYAH / WALI</label>
                            <input type="text" id="s-ayah" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="margin-top: 8px; justify-content: center;">Simpan Manual</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
