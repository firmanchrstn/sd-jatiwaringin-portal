<div class="view-section active">

    <div
        style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <div>
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 4px;">Manajemen Siswa</h1>
            <p style="color: var(--color-text-muted); font-size: 14px;">Kelola biodata, kelas, dan informasi orang tua.
            </p>
        </div>
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <div style="position: relative;">
                <i class="ph ph-funnel"
                    style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted);"></i>
                <select id="filter-kelas-siswa" class="form-control"
                    style="padding-left: 36px; width: auto; min-width: 160px; font-weight: 600; cursor: pointer;">
                    <option value="Semua">Semua Kelas</option>
                    <option value="1A">Kelas 1A</option>
                    <option value="1B">Kelas 1B</option>
                    <option value="2A">Kelas 2A</option>
                    <option value="3A">Kelas 3A</option>
                    <option value="4A">Kelas 4A</option>
                    <option value="5A">Kelas 5A</option>
                    <option value="6A">Kelas 6A</option>
                </select>
            </div>
            <button class="btn btn-outline"
                onclick="const form = document.getElementById('panel-tambah-manual'); form.style.display = form.style.display === 'none' ? 'block' : 'none';"
                style="background: var(--color-surface-solid);">
                <i class="ph ph-user-plus"></i> Input Manual
            </button>
        </div>
    </div>

    <div class="glass-panel"
        style="padding: 24px; margin-bottom: 24px; border-left: 4px solid var(--color-primary); background: linear-gradient(to right, var(--color-surface), transparent);">
        <h3 style="font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-fill ph-magic-wand" style="color: var(--color-primary); font-size: 20px;"></i>
            <span style="font-weight: 800;">Asisten AI (Input Masal)</span>
        </h3>
        <p style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 16px;">Ketik data siswa sekaligus.
            Cth: <i>"Budi (L) NIK 123 anak pak Joko, Siti (P) NIK 321 anak pak Anton."</i></p>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <textarea id="ai-siswa-input" class="form-control" placeholder="Tulis instruksi di sini..."
                style="resize: none; height: 46px; flex: 1; min-width: 250px; transition: height 0.2s;"
                onfocus="this.style.height='80px'" onblur="if(this.value==='') this.style.height='46px'"></textarea>

            <select id="s-kelas" class="form-control" style="width: 140px; height: 46px; cursor: pointer;">
                <option value="1A">Masuk 1A</option>
                <option value="1B">Masuk 1B</option>
                <option value="2A">Masuk 2A</option>
                <option value="3A">Masuk 3A</option>
                <option value="4A">Masuk 4A</option>
                <option value="5A">Masuk 5A</option>
                <option value="6A">Masuk 6A</option>
            </select>

            <button type="button" id="btn-proses-ai-siswa" class="btn btn-primary"
                style="height: 46px; white-space: nowrap;">
                <i class="ph ph-sparkle"></i> Proses Data
            </button>
        </div>
    </div>

    <div id="panel-tambah-manual" class="glass-panel"
        style="padding: 24px; margin-bottom: 24px; display: none; border-left: 4px solid var(--color-info);">
        <h3 style="font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-fill ph-keyboard" style="color: var(--color-info); font-size: 20px;"></i> Input Registrasi
            Tradisional
        </h3>

        <form id="form-tambah-siswa"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
            <div class="form-group">
                <label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">NAMA
                    LENGKAP SISWA</label>
                <input type="text" id="s-nama" class="form-control" required placeholder="Cth: Muhammad Budi...">
            </div>
            <div class="form-group">
                <label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">NOMOR
                    INDUK (NIK/NISN)</label>
                <input type="number" id="s-nik" class="form-control" required placeholder="Cth: 31750...">
            </div>
            <div class="form-group">
                <label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">JENIS
                    KELAMIN</label>
                <select id="s-jk" class="form-control" required cursor="pointer">
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                </select>
            </div>
            <div class="form-group">
                <label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">NAMA
                    WALI / AYAH</label>
                <input type="text" id="s-ayah" class="form-control" required placeholder="Cth: Bapak Joko...">
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
                <button type="submit" class="btn btn-outline"
                    style="width: 100%; justify-content: center; height: 44px; border-color: var(--color-info); color: var(--color-info);">
                    <i class="ph ph-floppy-disk"></i> Simpan Data
                </button>
            </div>
        </form>
    </div>

    <div class="glass-panel" style="overflow: hidden;">
        <div class="table-responsive">
            <table id="tabel-siswa">
                <thead>
                    <tr>
                        <th style="width: 35%;">INFO SISWA</th>
                        <th style="width: 15%;">KELAS</th>
                        <th style="width: 15%;">L/P</th>
                        <th style="width: 25%;">ORANG TUA</th>
                        <th style="width: 10%; text-align: right;">AKSI</th>
                    </tr>
                </thead>
                <tbody id="body-tabel-siswa">
                </tbody>
            </table>
        </div>
    </div>

</div>
