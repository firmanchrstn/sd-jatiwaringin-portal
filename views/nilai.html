<div class="view-section active">
    <div
        style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; flex-wrap: wrap; gap: 16px;">
        <div>
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 4px;">Penilaian Akademik</h1>
            <p style="color: var(--color-text-muted); font-size: 14px;">Kelola nilai Tugas, Ulangan, UTS, UAS dan Cetak
                Rapor.</p>
        </div>
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <div style="position: relative;">
                <i class="ph ph-funnel"
                    style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted);"></i>
                <select id="filter-kelas-nilai" class="form-control"
                    style="padding-left: 36px; min-width: 150px; cursor: pointer;">
                    <option value="Semua">Semua Kelas</option>
                    <option value="1A">Kelas 1A</option>
                    <option value="1B">Kelas 1B</option>
                    <option value="2A">Kelas 2A</option>
                    <option value="3A">Kelas 3A</option>
                    <option value="4A">Kelas 4A</option>
                    <option value="5A">Kelas 5A</option>
                    <option value="6A">Kelas 6A</option>
                </select>
            </div>
            <button class="btn btn-outline"
                style="background: var(--color-surface-solid); color: var(--color-warning); border-color: var(--color-warning-bg);"
                onclick="tampilkanToast('Fitur Rapor PDF sedang dikembangkan!', 'info')">
                <i class="ph ph-file-pdf"></i> Generate Rapor
            </button>
            <button class="btn btn-outline"
                onclick="const form = document.getElementById('panel-tambah-nilai'); form.style.display = form.style.display === 'none' ? 'block' : 'none';"
                style="background: var(--color-surface-solid);">
                <i class="ph ph-plus-circle"></i> Input Manual
            </button>
        </div>
    </div>

    <div class="glass-panel"
        style="padding: 24px; margin-bottom: 24px; border-left: 4px solid var(--color-primary); background: linear-gradient(to right, var(--color-surface), transparent);">
        <h3 style="font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-fill ph-magic-wand" style="color: var(--color-primary); font-size: 20px;"></i>
            <span style="font-weight: 800;">Asisten AI (Input Nilai Cepat)</span>
        </h3>
        <p style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 16px;">Ketik perolehan nilai siswa.
            Cth: <i>"Budi dapat 85, Siti 90, Joko dapat 60"</i></p>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <textarea id="ai-nilai-input" class="form-control" placeholder="Tulis instruksi nilai..."
                style="resize: none; height: 46px; flex: 1; transition: height 0.2s;" onfocus="this.style.height='80px'"
                onblur="if(this.value==='') this.style.height='46px'"></textarea>
            <input type="text" id="ai-mapel-target" class="form-control" placeholder="Mata Pelajaran"
                style="width: 150px; height: 46px;">
            <select id="ai-jenis-target" class="form-control" style="width: 120px; height: 46px;">
                <option value="Tugas">Tugas</option>
                <option value="Harian">Harian</option>
                <option value="UTS">UTS</option>
                <option value="UAS">UAS</option>
                <option value="Praktik">Praktik</option>
            </select>
            <button type="button" id="btn-proses-ai-nilai" class="btn btn-primary" style="height: 46px;">
                <i class="ph ph-sparkle"></i> Proses
            </button>
        </div>
    </div>

    <div id="panel-tambah-nilai" class="glass-panel"
        style="padding: 24px; margin-bottom: 24px; display: none; border-left: 4px solid var(--color-info);">
        <h3 style="font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;"><i
                class="ph-fill ph-keyboard" style="color: var(--color-info); font-size: 20px;"></i> Input Nilai Satuan
        </h3>
        <form id="form-tambah-nilai"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px;">
            <div class="form-group"><label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">NAMA
                    SISWA</label><input type="text" id="input-nilai-nama" class="form-control" required
                    placeholder="Nama Siswa"></div>
            <div class="form-group"><label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">MATA
                    PELAJARAN</label><input type="text" id="input-nilai-mapel" class="form-control" required
                    placeholder="Cth: Matematika"></div>
            <div class="form-group"><label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">JENIS
                    TES</label>
                <select id="input-nilai-jenis" class="form-control" required>
                    <option value="Tugas">Tugas</option>
                    <option value="Harian">Ulangan Harian</option>
                    <option value="UTS">UTS</option>
                    <option value="UAS">UAS</option>
                    <option value="Praktik">Praktik</option>
                    <option value="Sikap">Sikap</option>
                </select>
            </div>
            <div class="form-group"><label
                    style="font-size: 11px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 6px; display: block;">SKOR
                    (0-100)</label><input type="number" id="input-nilai-skor" class="form-control" required min="0"
                    max="100" placeholder="0"></div>
            <div class="form-group" style="display: flex; align-items: flex-end;"><button type="submit"
                    class="btn btn-outline"
                    style="width: 100%; justify-content: center; height: 44px; color: var(--color-info); border-color: var(--color-info);"><i
                        class="ph ph-floppy-disk"></i> Simpan Nilai</button></div>
        </form>
    </div>

    <div class="glass-panel" style="overflow: hidden;">
        <div class="table-responsive">
            <table id="tabel-nilai">
                <thead>
                    <tr>
                        <th>NAMA SISWA</th>
                        <th>MATA PELAJARAN</th>
                        <th>KATEGORI</th>
                        <th style="text-align: center;">SKOR</th>
                        <th>PREDIKAT</th>
                        <th style="text-align: right;">AKSI</th>
                    </tr>
                </thead>
                <tbody id="body-tabel-nilai"></tbody>
            </table>
        </div>
    </div>
</div>
