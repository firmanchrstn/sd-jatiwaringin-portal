<div class="view-section">
    <div class="page-header">
        <div class="header-text">
            <h1>Modul Nilai Akademik</h1>
            <p>Sistem penginputan dan rekapitulasi nilai evaluasi belajar siswa.</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h2>Input Nilai Baru</h2>
        </div>
        <div style="padding: 24px;">
            <form id="form-tambah-nilai" class="form-row">
                <div class="form-group" style="flex: 1.5;">
                    <label class="form-label">NAMA SISWA</label>
                    <input type="text" id="input-nilai-nama" class="form-control" placeholder="Mis: Ahmad Maulana"
                        required autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label">MATA PELAJARAN</label>
                    <input type="text" id="input-nilai-mapel" class="form-control" placeholder="Mis: Matematika"
                        required autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label">JENIS EVALUASI</label>
                    <select id="input-nilai-jenis" class="form-control" required>
                        <option value="" disabled selected>Pilih...</option>
                        <option value="Tugas Harian">Tugas Harian</option>
                        <option value="Ujian Tengah Semester">UTS</option>
                        <option value="Ujian Akhir Semester">UAS</option>
                    </select>
                </div>

                <div class="form-group" style="flex: 0.6;">
                    <label class="form-label">SKOR (0-100)</label>
                    <input type="number" id="input-nilai-skor" class="form-control" placeholder="0" min="0" max="100"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="ph ph-floppy-disk" style="font-size: 18px;"></i> Simpan
                </button>
            </form>
        </div>
    </div>

    <div class="card data-table-card">
        <div class="card-header">
            <div>
                <h2>Buku Nilai Kelas 4B</h2>
            </div>
            <button class="btn btn-outline" id="btn-ekspor-nilai">
                <i class="ph ph-download-simple"></i> Ekspor Rapor (CSV)
            </button>
        </div>
        <div class="table-responsive">
            <table id="tabel-nilai">
                <thead>
                    <tr>
                        <th>Nama Siswa</th>
                        <th>Mata Pelajaran</th>
                        <th>Jenis Evaluasi</th>
                        <th style="text-align: center;">Skor Akhir</th>
                        <th>Keterangan</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="body-tabel-nilai"></tbody>
            </table>
        </div>
    </div>
</div>
